<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realm</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Setup screen (shown until config is saved) -->
  <div id="setup-screen" class="hidden">
    <div class="setup-box">
      <h2>Realm — First Run</h2>
      <p>Enter your GitHub details to connect to your world fork.</p>
      <label>GitHub username / userid
        <input id="cfg-userid" type="text" placeholder="leshikus" />
      </label>
      <label>Repository (owner/repo)
        <input id="cfg-repo" type="text" placeholder="leshikus/realm" />
      </label>
      <label>GitHub token (needs <code>contents</code> + <code>pull_requests</code> scope)
        <input id="cfg-token" type="password" placeholder="ghp_..." />
      </label>
      <button id="cfg-save">Save & Load World</button>
      <p class="hint">Config is stored in <code>localStorage</code> — never sent anywhere except GitHub API.</p>
    </div>
  </div>

  <!-- Main UI -->
  <div id="app" class="hidden">
    <header>
      <span id="header-title">REALM</span>
      <span id="header-turn"></span>
      <span id="header-trust"></span>
      <button id="btn-reload">↻ Reload</button>
      <button id="btn-config">⚙ Config</button>
    </header>

    <nav>
      <button class="tab-btn active" data-tab="map">Map</button>
      <button class="tab-btn" data-tab="orders">Orders</button>
      <button class="tab-btn" data-tab="events">Events</button>
      <button class="tab-btn" data-tab="stats">Statistics</button>
    </nav>

    <!-- Map tab -->
    <div id="tab-map" class="tab active">
      <canvas id="map-canvas"></canvas>
      <div id="region-detail" class="detail-panel hidden"></div>
    </div>

    <!-- Orders tab -->
    <div id="tab-orders" class="tab hidden">
      <div class="orders-layout">
        <div class="orders-form">
          <h3>Compose Order</h3>
          <label>Type
            <select id="order-type"></select>
          </label>
          <label>Params (JSON)
            <textarea id="order-params" rows="4"></textarea>
          </label>
          <button id="btn-add-order">+ Add Order</button>
        </div>
        <div class="orders-queue">
          <h3>Orders this turn <span id="order-count">(0)</span></h3>
          <ul id="orders-list"></ul>
          <button id="btn-clear-orders">Clear</button>
          <button id="btn-submit-orders" class="primary">Submit Turn (open PR)</button>
          <p id="orders-status"></p>
        </div>
      </div>
    </div>

    <!-- Events tab -->
    <div id="tab-events" class="tab hidden">
      <div class="events-toolbar">
        <input id="events-filter" type="text" placeholder="Filter by faction, hero, region…" />
      </div>
      <ul id="events-list"></ul>
    </div>

    <!-- Statistics tab -->
    <div id="tab-stats" class="tab hidden">
      <div class="charts-grid">
        <div class="chart-box"><canvas id="chart-trust"></canvas></div>
        <div class="chart-box"><canvas id="chart-belief"></canvas></div>
        <div class="chart-box"><canvas id="chart-army"></canvas></div>
        <div class="chart-box"><canvas id="chart-unrest"></canvas></div>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
